<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="QR Virement">
<meta name="theme-color" content="#F5F4F1">
<title>QR Virement — Endodontie Louise</title>

<link rel="apple-touch-icon" id="apple-icon" sizes="180x180">
<link rel="icon" id="fav-icon" type="image/png" sizes="32x32">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:#F5F4F1;--card:#FFFFFF;--border:#ECEAE4;--border-hover:#D5D2CC;
    --text:#1a1a1a;--text-s:#6B6560;--text-t:#9B9590;
    --blue:#1558A0;--blue-l:#E8F0F8;--blue-h:#1268B8;
    --green:#1a7a4a;--green-l:#E6F4ED;
    --orange:#D4860A;--orange-l:#FFF3E0;
    --red:#c0392b;--red-l:#FDECEA;
    --purple:#6C5CE7;--purple-l:#F0EEFF;
    --r:10px;--rs:6px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding-top: max(40px, calc(var(--safe-top) + 20px));
    padding-bottom: max(40px, calc(var(--safe-bottom) + 20px));
    padding-left: 16px;
    padding-right: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Install banner ─── */
  #install-banner {
    display: none;
    position: fixed;
    top: max(16px, calc(var(--safe-top) + 8px));
    left: 16px; right: 16px;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 18px;
    align-items: center;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    animation: slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #install-banner.visible { display: flex; }
  .banner-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--blue), var(--blue-h));
    border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(21,88,160,0.2);
  }
  .banner-text { flex: 1; }
  .banner-text strong { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .banner-text span { font-size: 11px; color: var(--text-s); line-height: 1.4; }
  .banner-steps { display: flex; align-items: center; gap: 4px; margin-top: 6px; }
  .step-pill {
    background: var(--blue-l); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px;
    font-size: 10px; color: var(--blue); font-weight: 600;
  }
  .step-arrow { font-size: 9px; color: var(--text-t); }
  .banner-close { background: none; border: none; color: var(--text-t); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }

  /* ─── Header ─── */
  .header {
    text-align: center; margin-bottom: 24px;
    width: 100%; max-width: 480px;
  }
  .header .logo-line {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 8px;
  }
  .app-icon {
    width: 42px; height: 42px; border-radius: var(--r);
    background: linear-gradient(135deg, var(--purple), #8B5CF6);
    display: flex; align-items: center; justify-content: center;
    color: #fff; box-shadow: 0 2px 10px rgba(108,92,231,0.2);
  }
  .header h1 {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-t);
  }
  .header h2 {
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 700; color: var(--text); margin-top: 4px;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 12.5px; color: var(--text-s); margin-top: 4px;
  }

  /* ─── Layout ─── */
  .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }

  /* ─── Cards ─── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 20px;
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--border-hover); }

  .card-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-s); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title svg { width: 15px; height: 15px; color: var(--blue); }

  /* ─── Fields ─── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block; font-size: 11px; font-weight: 500;
    letter-spacing: 0.03em; text-transform: uppercase;
    color: var(--text-s); margin-bottom: 5px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--rs); padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(21,88,160,0.08);
    background: var(--card);
  }
  input::placeholder { color: var(--text-t); }
  input[type="number"] { -moz-appearance: textfield; font-family: 'DM Mono', monospace; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .amount-wrapper { position: relative; }
  .amount-wrapper input { padding-right: 42px; font-size: 18px; font-weight: 700; }
  .amount-currency {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 13px; font-weight: 600;
    color: var(--blue); pointer-events: none;
  }

  /* ─── Toggle section ─── */
  .toggle-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .toggle-arrow { font-size: 12px; color: var(--text-t); transition: transform 0.25s; }
  .toggle-arrow.open { transform: rotate(180deg); }
  .toggle-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, margin-top 0.3s ease; }
  .toggle-body.open { max-height: 300px; margin-top: 16px; }

  /* ─── Generate button ─── */
  .btn-generate {
    width: 100%; padding: 14px;
    background: var(--blue);
    border: none; border-radius: var(--rs); color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    -webkit-appearance: none;
    box-shadow: 0 4px 12px rgba(21,88,160,0.25);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-generate:hover { background: var(--blue-h); transform: translateY(-1px); }
  .btn-generate:active { transform: scale(0.98); box-shadow: none; }
  .btn-generate svg { width: 16px; height: 16px; }

  /* ─── QR Result ─── */
  .qr-result { display: none; }
  .qr-result.visible { display: block; }

  .qr-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 24px;
    animation: fadeUp 0.4s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .qr-inner { display: flex; flex-direction: column; align-items: center; gap: 20px; }

  .qr-box {
    background: #fff; border-radius: var(--r); padding: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    width: 180px; height: 180px;
    display: flex; align-items: center; justify-content: center;
  }

  .qr-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--green-l); border-radius: 20px; padding: 4px 12px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--green); margin-bottom: 4px;
  }
  .qr-badge::before {
    content: ''; width: 6px; height: 6px;
    background: var(--green); border-radius: 50%;
  }

  .qr-details { width: 100%; text-align: center; }
  .qr-amount-display {
    font-size: 36px; font-weight: 700; color: var(--text);
    font-family: 'DM Mono', monospace; line-height: 1;
  }
  .qr-amount-display span { font-size: 16px; color: var(--blue); font-weight: 600; }
  .qr-comm { font-size: 13px; color: var(--text-s); margin: 8px 0 16px; }
  .qr-meta {
    font-size: 12px; color: var(--text-s);
    line-height: 1.8; text-align: left;
    background: var(--bg); border-radius: var(--rs); padding: 12px 14px;
  }
  .qr-meta strong {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-t);
    display: block; margin-top: 8px;
  }
  .qr-meta strong:first-child { margin-top: 0; }

  /* ─── Action buttons ─── */
  .qr-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 4px; }
  .btn-action {
    padding: 10px; border-radius: var(--rs);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: 1px solid;
    -webkit-appearance: none;
  }
  .btn-share {
    background: var(--blue); border-color: var(--blue);
    color: #fff; grid-column: 1 / -1;
  }
  .btn-share:active { background: var(--blue-h); }
  .btn-download {
    background: var(--blue-l); border-color: var(--border); color: var(--blue);
  }
  .btn-download:active { background: var(--blue); color: #fff; }
  .btn-new {
    background: var(--card); border-color: var(--border); color: var(--text-s);
  }
  .btn-new:active { background: var(--bg); }

  /* ─── Error ─── */
  .error-msg {
    background: var(--red-l); border: 1px solid rgba(192,57,43,0.2);
    border-radius: var(--rs); padding: 12px 16px;
    font-size: 13px; color: var(--red); display: none;
  }
  .error-msg.visible { display: block; }

  /* ─── Offline indicator ─── */
  #offline-badge {
    position: fixed; bottom: max(20px, calc(var(--safe-bottom) + 12px));
    left: 50%; transform: translateX(-50%);
    background: var(--red); border-radius: 20px;
    padding: 6px 16px; font-size: 12px; font-weight: 600;
    color: #fff; display: none; z-index: 99;
  }
  #offline-badge.visible { display: block; }

  /* ─── Print ─── */
  @media print {
    body { background: white; padding: 20px; }
    #install-banner, .header, .card:not(.qr-result), .btn-generate,
    .qr-actions, #offline-badge { display: none !important; }
    .qr-result { display: block !important; }
    .qr-card { border: 1px solid #ddd; background: white; box-shadow: none; }
    .qr-amount-display { color: #111; }
    .qr-amount-display span { color: var(--blue); }
    .qr-comm, .qr-meta { color: #555; }
    .qr-meta { background: #f9f9f9; }
    .qr-meta strong { color: #333; }
    .qr-box { box-shadow: none; }
  }
</style>
</head>
<body>

<!-- Install banner (iOS) -->
<div id="install-banner">
  <div class="banner-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h3v3h-3zM14 18h3v3h-3z"/></svg>
  </div>
  <div class="banner-text">
    <strong>Installer l'app</strong>
    <div class="banner-steps">
      <span class="step-pill">Partage</span>
      <span class="step-arrow">›</span>
      <span class="step-pill">Sur l'écran d'accueil</span>
    </div>
  </div>
  <button class="banner-close" onclick="dismissBanner()">✕</button>
</div>

<!-- Offline badge -->
<div id="offline-badge">Hors ligne</div>

<div class="header">
  <div class="logo-line">
    <div class="app-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h3v3h-3zM14 18h3v3h-3z"/></svg>
    </div>
  </div>
  <h1>Cabinet Endodontie Louise</h1>
  <h2>QR Virement SEPA</h2>
  <p>Toutes banques belges compatibles</p>
</div>

<div class="container">

  <!-- Coordonnées bancaires (collapsible) -->
  <div class="card">
    <div class="card-title toggle-header" onclick="toggleBank()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>
      Coordonnées bancaires
      <span class="toggle-arrow" id="bankArrow">▾</span>
    </div>
    <div class="toggle-body" id="bankBody">
      <div class="field">
        <label>Bénéficiaire</label>
        <input type="text" id="beneficiary" placeholder="Cabinet Endodontie Louise"
               value="Cabinet Endodontie Louise" autocomplete="organization">
      </div>
      <div class="two-col">
        <div class="field">
          <label>IBAN</label>
          <input type="text" id="iban" placeholder="BE00 0000 0000 0000"
                 maxlength="32" autocomplete="off" inputmode="text">
        </div>
        <div class="field">
          <label>BIC</label>
          <input type="text" id="bic" placeholder="GEBABEBB"
                 maxlength="11" autocomplete="off" inputmode="text">
        </div>
      </div>
    </div>
  </div>

  <!-- Paiement -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Paiement patient
    </div>
    <div class="two-col">
      <div class="field">
        <label>Montant</label>
        <div class="amount-wrapper">
          <input type="number" id="amount" placeholder="0.00"
                 min="0.01" step="0.01" inputmode="decimal">
          <span class="amount-currency">€</span>
        </div>
      </div>
      <div class="field">
        <label>Communication</label>
        <input type="text" id="communication"
               placeholder="Dupont 25/03" maxlength="70">
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Generate -->
  <button class="btn-generate" onclick="generateQR()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h3v3h-3zM14 18h3v3h-3z"/></svg>
    Générer le QR Code
  </button>

  <!-- Result -->
  <div class="qr-result" id="qrResult">
    <div class="qr-card">
      <div class="qr-inner">
        <div>
          <div class="qr-badge">Prêt à scanner</div>
        </div>
        <div class="qr-box">
          <div id="qrcode"></div>
        </div>
        <div class="qr-details">
          <div class="qr-amount-display" id="displayAmount">— <span>EUR</span></div>
          <div class="qr-comm" id="displayComm">—</div>
          <div class="qr-meta">
            <strong>Bénéficiaire</strong>
            <span id="displayBenef">—</span>
            <strong>IBAN</strong>
            <span id="displayIban">—</span>
          </div>
        </div>
        <div class="qr-actions">
          <button class="btn-action btn-share" id="btnShare" onclick="shareQR()">
            Partager / Envoyer au patient
          </button>
          <button class="btn-action btn-download" id="btnDownload">
            Télécharger
          </button>
          <button class="btn-action btn-new" onclick="resetForm()">
            Nouveau
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- QR lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ─── STORAGE ─── */
const STORAGE_KEY = 'endo_bank_config';

function saveConfig() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      beneficiary: document.getElementById('beneficiary').value,
      iban: document.getElementById('iban').value,
      bic: document.getElementById('bic').value,
    }));
  } catch(e) {}
}

function loadConfig() {
  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (cfg.beneficiary) document.getElementById('beneficiary').value = cfg.beneficiary;
    if (cfg.iban)        document.getElementById('iban').value        = cfg.iban;
    if (cfg.bic)         document.getElementById('bic').value         = cfg.bic;
  } catch(e) {}
}

/* ─── BANK TOGGLE ─── */
let bankOpen = false;
function toggleBank() {
  bankOpen = !bankOpen;
  document.getElementById('bankBody').classList.toggle('open', bankOpen);
  document.getElementById('bankArrow').classList.toggle('open', bankOpen);
}

/* ─── IBAN ─── */
function formatIBAN(raw) { return raw.replace(/\s/g,'').toUpperCase(); }
function validateIBAN(iban) { return /^[A-Z]{2}[0-9]{2}[A-Z0-9]{4,}$/.test(iban); }

/* ─── QR GENERATION ─── */
let currentCanvas = null;
let lastPayload = '';

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('visible');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function generateQR() {
  clearError();
  saveConfig();

  const beneficiary = document.getElementById('beneficiary').value.trim();
  const ibanRaw     = document.getElementById('iban').value.trim();
  const bic         = document.getElementById('bic').value.trim().toUpperCase();
  const amountStr   = document.getElementById('amount').value.trim();
  const comm        = document.getElementById('communication').value.trim();

  if (!beneficiary) return showError('Renseignez le nom du bénéficiaire (section coordonnées).');
  if (!ibanRaw)     return showError('Renseignez l\'IBAN (section coordonnées).');
  const iban = formatIBAN(ibanRaw);
  if (!validateIBAN(iban)) return showError('Format IBAN invalide.');
  if (!amountStr || parseFloat(amountStr) <= 0) return showError('Montant invalide.');

  const amount = parseFloat(amountStr).toFixed(2);

  lastPayload = [
    'BCD','002','1','SCT',
    bic, beneficiary, iban,
    'EUR' + amount,
    '','', comm, ''
  ].join('\n');

  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  currentCanvas = null;

  try {
    new QRCode(container, {
      text: lastPayload,
      width: 156, height: 156,
      colorDark: '#000', colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    return showError('Erreur QR : ' + e.message);
  }

  document.getElementById('displayAmount').innerHTML = amount + ' <span>EUR</span>';
  document.getElementById('displayComm').textContent = comm || '(sans communication)';
  document.getElementById('displayBenef').textContent = beneficiary;
  document.getElementById('displayIban').textContent = iban.replace(/(.{4})/g,'$1 ').trim();

  document.getElementById('qrResult').classList.add('visible');
  document.getElementById('qrResult').scrollIntoView({ behavior:'smooth', block:'nearest' });

  setTimeout(() => {
    const canvas = container.querySelector('canvas');
    if (canvas) {
      currentCanvas = canvas;
      document.getElementById('btnDownload').onclick = downloadQR;
    }
  }, 300);
}

/* ─── DOWNLOAD ─── */
function downloadQR() {
  if (!currentCanvas) return;
  const big = document.createElement('canvas');
  big.width = 400; big.height = 400;
  const ctx = big.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,400,400);
  ctx.drawImage(currentCanvas, 22, 22, 356, 356);
  const link = document.createElement('a');
  const comm = document.getElementById('communication').value.trim();
  link.download = 'qr-virement-' + (comm||'patient').replace(/\s+/g,'-') + '.png';
  link.href = big.toDataURL('image/png');
  link.click();
}

/* ─── SHARE ─── */
async function shareQR() {
  if (!currentCanvas) return;
  const comm = document.getElementById('communication').value.trim();
  const amount = document.getElementById('amount').value;

  if (navigator.share && navigator.canShare) {
    try {
      const big = document.createElement('canvas');
      big.width = 400; big.height = 400;
      const ctx = big.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,400,400);
      ctx.drawImage(currentCanvas, 22, 22, 356, 356);

      big.toBlob(async (blob) => {
        const file = new File([blob], 'virement-qr.png', { type: 'image/png' });
        try {
          await navigator.share({
            title: 'QR Virement — ' + (comm || 'Endodontie Louise'),
            text: 'QR code virement SEPA — ' + amount + ' EUR\nScannez avec votre app bancaire.',
            files: [file]
          });
        } catch(e) {
          if (e.name !== 'AbortError') downloadQR();
        }
      }, 'image/png');
      return;
    } catch(e) {}
  }

  if (navigator.share) {
    try {
      await navigator.share({
        title: 'QR Virement SEPA',
        text: 'Montant : ' + amount + ' EUR — ' + (comm || '') + '\nScannez avec votre application bancaire.'
      });
      return;
    } catch(e) {}
  }

  downloadQR();
}

/* ─── iOS INSTALL BANNER ─── */
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function isInStandaloneMode() { return ('standalone' in navigator && navigator.standalone); }
function dismissBanner() {
  document.getElementById('install-banner').classList.remove('visible');
  try { sessionStorage.setItem('banner_dismissed','1'); } catch(e){}
}
function checkInstallBanner() {
  if (isIOS() && !isInStandaloneMode()) {
    const dismissed = sessionStorage.getItem('banner_dismissed');
    if (!dismissed) {
      setTimeout(() => { document.getElementById('install-banner').classList.add('visible'); }, 2000);
    }
  }
}

/* ─── APP ICON ─── */
function generateAppIcon() {
  const c = document.createElement('canvas');
  c.width = 180; c.height = 180;
  const ctx = c.getContext('2d');

  const grad = ctx.createLinearGradient(0,0,180,180);
  grad.addColorStop(0,'#6C5CE7');
  grad.addColorStop(1,'#8B5CF6');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0,0,180,180,36);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px Helvetica Neue, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('€', 90, 82);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '600 13px Helvetica Neue, Arial';
  ctx.fillText('QR VIREMENT', 90, 145);

  const dataURL = c.toDataURL('image/png');
  document.getElementById('apple-icon').href = dataURL;
  document.getElementById('fav-icon').href = dataURL;

  const manifest = {
    name: 'QR Virement — Endodontie Louise',
    short_name: 'QR Virement',
    description: 'Générateur de QR code de virement SEPA',
    start_url: './',
    display: 'standalone',
    background_color: '#F5F4F1',
    theme_color: '#F5F4F1',
    orientation: 'portrait',
    icons: [{ src: dataURL, sizes: '180x180', type: 'image/png', purpose: 'any maskable' }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
}

/* ─── SERVICE WORKER ─── */
function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'endo-qr-v2';
const CDNJS = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
const FONTS = 'https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap';

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll([CDNJS, FONTS]).catch(()=>{})));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(resp => {
        if (resp && resp.status === 200) {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => cached);
    })
  );
});
`;
  const swBlob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope: './'}).catch(() => {});
}

/* ─── ONLINE / OFFLINE ─── */
function updateOnlineStatus() {
  document.getElementById('offline-badge').classList.toggle('visible', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('iban').addEventListener('blur', function() {
    const clean = this.value.replace(/\s/g,'').toUpperCase();
    this.value = clean.replace(/(.{4})/g,'$1 ').trim();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.target.closest('#bankBody')) generateQR();
  });

  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if (!cfg.iban) toggleBank();
  } catch(e) { toggleBank(); }
});
