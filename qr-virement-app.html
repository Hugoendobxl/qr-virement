<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR Virement">
<meta name="theme-color" content="#0a0f1e">
<title>QR Virement — Endodontie Louise</title>

<!-- Apple touch icon généré dynamiquement (voir script) -->
<link rel="apple-touch-icon" id="apple-icon" sizes="180x180">
<link rel="icon" id="fav-icon" type="image/png" sizes="32x32">

<!-- Fonts avec fallback offline via CSS embed -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --navy: #0a0f1e;
    --royal: #1a3a8f;
    --royal-light: #2a52c9;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --surface: #111827;
    --surface2: #1c2638;
    --border: rgba(255,255,255,0.08);
    --text: #f0f4ff;
    --muted: #8899bb;
    --success: #22c55e;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Syne', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding-top: max(40px, calc(var(--safe-top) + 20px));
    padding-bottom: max(40px, calc(var(--safe-bottom) + 20px));
    padding-left: 16px;
    padding-right: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,58,143,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
    background-attachment: fixed;
  }

  /* ─── Install banner ─── */
  #install-banner {
    display: none;
    position: fixed;
    top: max(16px, calc(var(--safe-top) + 8px));
    left: 16px; right: 16px;
    z-index: 100;
    background: linear-gradient(135deg, rgba(26,58,143,0.95), rgba(10,15,30,0.98));
    border: 1px solid rgba(42,82,201,0.4);
    border-radius: 16px;
    padding: 16px 18px;
    display: none;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #install-banner.visible { display: flex; }
  .banner-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--royal), var(--royal-light));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(26,58,143,0.5);
  }
  .banner-text { flex: 1; }
  .banner-text strong {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .banner-text span {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }
  .banner-steps {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
  }
  .step-pill {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--gold-light);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .step-arrow { font-size: 9px; color: var(--muted); }
  .banner-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    line-height: 1;
  }

  /* ─── Header ─── */
  .header {
    text-align: center;
    margin-bottom: 32px;
    width: 100%;
    max-width: 480px;
  }
  .header .logo-line {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 8px;
  }
  .logo-dot {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--gold);
  }
  .header h1 {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold);
  }
  .header h2 {
    font-family: 'Lora', Georgia, serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 400; color: var(--text); margin-top: 6px;
  }
  .header p {
    font-size: 13px; color: var(--muted); margin-top: 8px;
    font-family: 'Lora', Georgia, serif; font-style: italic;
  }

  /* ─── Layout ─── */
  .container {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    gap: 16px;
  }

  /* ─── Cards ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 22px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
  }
  .card-patient { background: var(--surface2); border-color: rgba(42,82,201,0.2); }
  .card-patient::before { background: linear-gradient(90deg, transparent, rgba(42,82,201,0.5), transparent); }

  .card-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; width: 14px; height: 1px;
    background: var(--gold); opacity: 0.5;
  }

  /* ─── Fields ─── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block; font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 5px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    font-family: 'Syne', 'Helvetica Neue', sans-serif;
    font-size: 16px; /* >= 16px prevents iOS zoom */
    color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  input:focus {
    border-color: rgba(42,82,201,0.6);
    box-shadow: 0 0 0 3px rgba(42,82,201,0.12);
  }
  input::placeholder { color: rgba(136,153,187,0.35); }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .amount-wrapper { position: relative; }
  .amount-wrapper input {
    padding-right: 52px;
    font-size: 20px; font-weight: 700;
  }
  .amount-currency {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 13px; font-weight: 700;
    color: var(--gold); pointer-events: none;
  }

  /* ─── Toggle section ─── */
  .toggle-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .toggle-arrow {
    font-size: 12px; color: var(--muted);
    transition: transform 0.25s;
  }
  .toggle-arrow.open { transform: rotate(180deg); }
  .toggle-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease, margin-top 0.3s ease;
  }
  .toggle-body.open { max-height: 600px; margin-top: 18px; }

  /* ─── Generate button ─── */
  .btn-generate {
    width: 100%; padding: 17px;
    background: linear-gradient(135deg, var(--royal) 0%, var(--royal-light) 100%);
    border: 1px solid rgba(42,82,201,0.4);
    border-radius: 14px; color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    -webkit-appearance: none; position: relative; overflow: hidden;
    box-shadow: 0 4px 20px rgba(26,58,143,0.35);
  }
  .btn-generate::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-generate:active { transform: scale(0.98); box-shadow: none; }

  /* ─── QR Result ─── */
  .qr-result { display: none; }
  .qr-result.visible { display: block; }

  .qr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .qr-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(34,197,94,0.5), transparent);
  }

  .qr-inner {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }

  .qr-box {
    background: #fff; border-radius: 12px; padding: 12px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.4);
    width: 180px; height: 180px;
    display: flex; align-items: center; justify-content: center;
  }

  .qr-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 20px; padding: 4px 12px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--success); margin-bottom: 4px;
  }
  .qr-badge::before {
    content: ''; width: 6px; height: 6px;
    background: var(--success); border-radius: 50%;
    box-shadow: 0 0 8px var(--success);
  }

  .qr-details { width: 100%; text-align: center; }
  .qr-amount-display {
    font-size: 38px; font-weight: 800; color: var(--text); line-height: 1;
  }
  .qr-amount-display span { font-size: 18px; color: var(--gold); font-weight: 600; }
  .qr-comm {
    font-family: 'Lora', Georgia, serif; font-style: italic;
    font-size: 14px; color: var(--muted); margin: 8px 0 16px;
  }
  .qr-meta {
    font-size: 12px; color: rgba(136,153,187,0.6);
    line-height: 1.8; text-align: left;
    background: rgba(255,255,255,0.03);
    border-radius: 10px; padding: 12px 14px;
  }
  .qr-meta strong {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    display: block; margin-top: 8px;
  }
  .qr-meta strong:first-child { margin-top: 0; }

  /* ─── Action buttons ─── */
  .qr-actions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%; margin-top: 4px;
  }
  .btn-action {
    padding: 12px 10px; border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; border: 1px solid;
    -webkit-appearance: none;
  }
  .btn-share {
    background: rgba(201,168,76,0.1);
    border-color: rgba(201,168,76,0.3);
    color: var(--gold-light);
    grid-column: 1 / -1;
  }
  .btn-share:active { background: rgba(201,168,76,0.2); }
  .btn-download {
    background: rgba(26,58,143,0.15);
    border-color: rgba(42,82,201,0.3); color: #7ba7ff;
  }
  .btn-download:active { background: rgba(26,58,143,0.3); }
  .btn-new {
    background: transparent;
    border-color: var(--border); color: var(--muted);
  }
  .btn-new:active { background: rgba(255,255,255,0.05); }

  /* ─── Error ─── */
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; color: #fca5a5; display: none;
  }
  .error-msg.visible { display: block; }

  /* ─── Offline indicator ─── */
  #offline-badge {
    position: fixed; bottom: max(20px, calc(var(--safe-bottom) + 12px));
    left: 50%; transform: translateX(-50%);
    background: rgba(239,68,68,0.9); border-radius: 20px;
    padding: 6px 16px; font-size: 12px; font-weight: 600;
    color: #fff; display: none; z-index: 99;
    backdrop-filter: blur(10px);
  }
  #offline-badge.visible { display: block; }

  /* ─── PIN Lock Screen ─── */
  
  

  .pin-logo {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 48px;
  }
  .pin-logo-dots {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .pin-logo-dot {
    width: 7px; height: 7px;
    background: var(--gold); border-radius: 50%;
    box-shadow: 0 0 10px var(--gold);
  }
  .pin-logo h1 {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px;
  }
  .pin-logo h2 {
    font-family: 'Lora', Georgia, serif;
    font-size: 22px; font-weight: 400; color: var(--text);
  }

  .pin-label {
    font-size: 13px; color: var(--muted);
    letter-spacing: 0.08em; margin-bottom: 28px;
    font-family: 'Lora', Georgia, serif; font-style: italic;
  }

  /* PIN dots indicator */
  .pin-dots {
    display: flex; gap: 16px; margin-bottom: 44px;
  }
  .pin-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.4);
    background: transparent;
    transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pin-dot.filled {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.6);
    transform: scale(1.15);
  }
  .pin-dot.error {
    background: #ef4444;
    border-color: #ef4444;
    box-shadow: 0 0 12px rgba(239,68,68,0.6);
  }

  /* Shake animation */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15%      { transform: translateX(-10px); }
    30%      { transform: translateX(10px); }
    45%      { transform: translateX(-8px); }
    60%      { transform: translateX(8px); }
    75%      { transform: translateX(-4px); }
    90%      { transform: translateX(4px); }
  }
  .pin-dots.shake { animation: shake 0.5s ease; }

  /* Keypad */
  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 280px;
  }
  .pin-key {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
    -webkit-appearance: none;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    user-select: none;
    -webkit-user-select: none;
  }
  .pin-key:active, .pin-key.pressed {
    background: var(--surface2);
    transform: scale(0.92);
    box-shadow: none;
  }
  .pin-key.pin-zero { grid-column: 2; }
  .pin-key.pin-del {
    background: transparent;
    border-color: transparent;
    font-size: 20px;
    color: var(--muted);
    box-shadow: none;
    grid-column: 3;
  }
  .pin-key.pin-del:active { color: var(--text); transform: scale(0.9); }

  .pin-error-msg {
    margin-top: 24px;
    font-size: 12px; color: #ef4444;
    font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0; transition: opacity 0.2s;
    height: 16px;
  }
  .pin-error-msg.visible { opacity: 1; }

  /* ─── Print ─── */
  @media print {
    body { background: white; padding: 20px; }
    #install-banner, .header, .card:not(.qr-result), .btn-generate,
    .qr-actions, #offline-badge { display: none !important; }
    .qr-result { display: block !important; }
    .qr-card { border: 1px solid #ddd; background: white; box-shadow: none; color: #111; }
    .qr-card::before { display: none; }
    .qr-badge { color: #16a34a; border-color: #16a34a; background: #f0fdf4; }
    .qr-amount-display { color: #111; }
    .qr-amount-display span { color: #92400e; }
    .qr-comm, .qr-meta { color: #555; }
    .qr-meta { background: #f9f9f9; }
    .qr-meta strong { color: #333; }
    .qr-box { box-shadow: none; }
  }
</style>
</head>
<body>

<!-- PIN Lock Screen -->
<div class="container">

  <!-- Coordonnées bancaires (collapsible) -->
  <div class="card">
    <div class="card-title toggle-header" onclick="toggleBank()">
      Coordonnées bancaires
      <span class="toggle-arrow" id="bankArrow">▾</span>
    </div>
    <div class="toggle-body" id="bankBody">
      <div class="field">
        <label>Bénéficiaire</label>
        <input type="text" id="beneficiary" placeholder="Cabinet Endodontie Louise"
               value="Cabinet Endodontie Louise" autocomplete="organization">
      </div>
      <div class="two-col">
        <div class="field">
          <label>IBAN</label>
          <input type="text" id="iban" placeholder="BE00 0000 0000 0000"
                 maxlength="32" autocomplete="off" inputmode="text">
        </div>
        <div class="field">
          <label>BIC</label>
          <input type="text" id="bic" placeholder="GEBABEBB"
                 maxlength="11" autocomplete="off" inputmode="text">
        </div>
      </div>
    </div>
  </div>

  <!-- Paiement -->
  <div class="card card-patient">
    <div class="card-title">Paiement patient</div>
    <div class="two-col">
      <div class="field">
        <label>Montant</label>
        <div class="amount-wrapper">
          <input type="number" id="amount" placeholder="0.00"
                 min="0.01" step="0.01" inputmode="decimal">
          <span class="amount-currency">€</span>
        </div>
      </div>
      <div class="field">
        <label>Communication</label>
        <input type="text" id="communication"
               placeholder="Dupont 25/03" maxlength="70">
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Generate -->
  <button class="btn-generate" onclick="generateQR()">
    ⬡ &nbsp; Générer le QR Code
  </button>

  <!-- Result -->
  <div class="qr-result" id="qrResult">
    <div class="qr-card">
      <div class="qr-inner">
        <div>
          <div class="qr-badge">Prêt à scanner</div>
        </div>
        <div class="qr-box">
          <div id="qrcode"></div>
        </div>
        <div class="qr-details">
          <div class="qr-amount-display" id="displayAmount">— <span>EUR</span></div>
          <div class="qr-comm" id="displayComm">—</div>
          <div class="qr-meta">
            <strong>Bénéficiaire</strong>
            <span id="displayBenef">—</span>
            <strong>IBAN</strong>
            <span id="displayIban">—</span>
          </div>
        </div>
        <div class="qr-actions">
          <button class="btn-action btn-share" id="btnShare" onclick="shareQR()">
            ↑ &nbsp; Partager / Envoyer au patient
          </button>
          <button class="btn-action btn-download" id="btnDownload">
            ⬇ Télécharger
          </button>
          <button class="btn-action btn-new" onclick="resetForm()">
            ↺ Nouveau
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- QR lib inlined -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ─────────────────────────────────────────────
   PIN LOCK
───────────────────────────────────────────── */
const CORRECT_PIN = '2106';
let

function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(checkPin, 120);
  }
}

function pinDel() {
  if (pinEntry.length === 0) return;
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('filled', i < pinEntry.length);
    dot.classList.remove('error');
  }
}

function checkPin() {
  if (pinEntry === CORRECT_PIN) {
    // Unlock
    screen.style.opacity = '0';
    screen.style.transition = 'opacity 0.3s ease';
    setTimeout(() => screen.classList.add('hidden'), 300);
    try { sessionStorage.setItem('pin_unlocked', '1'); } catch(e) {}
  } else {
    // Wrong PIN
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).classList.add('error');
    }
    const dots = document.getElementById('pinDots');
    dots.classList.add('shake');
    const err = document.getElementById('pinError');
    err.classList.add('visible');
    setTimeout(() => {
      dots.classList.remove('shake');
      err.classList.remove('visible');
      updatePinDots();
    }, 800);
  }
}

  try {
    if (sessionStorage.getItem('pin_unlocked') === '1') {
    }
  } catch(e) {}
}

/* ─────────────────────────────────────────────
   STORAGE — persist bank config locally
───────────────────────────────────────────── */
const STORAGE_KEY = 'endo_bank_config';

function saveConfig() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      beneficiary: document.getElementById('beneficiary').value,
      iban: document.getElementById('iban').value,
      bic: document.getElementById('bic').value,
    }));
  } catch(e) {}
}

function loadConfig() {
  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (cfg.beneficiary) document.getElementById('beneficiary').value = cfg.beneficiary;
    if (cfg.iban)        document.getElementById('iban').value        = cfg.iban;
    if (cfg.bic)         document.getElementById('bic').value         = cfg.bic;
  } catch(e) {}
}

/* ─────────────────────────────────────────────
   BANK SECTION TOGGLE
───────────────────────────────────────────── */
let bankOpen = false;
function toggleBank() {
  bankOpen = !bankOpen;
  document.getElementById('bankBody').classList.toggle('open', bankOpen);
  document.getElementById('bankArrow').classList.toggle('open', bankOpen);
}

/* ─────────────────────────────────────────────
   IBAN HELPERS
───────────────────────────────────────────── */
function formatIBAN(raw) { return raw.replace(/\s/g,'').toUpperCase(); }
function validateIBAN(iban) {
  return /^[A-Z]{2}[0-9]{2}[A-Z0-9]{4,}$/.test(iban);
}

/* ─────────────────────────────────────────────
   QR GENERATION
───────────────────────────────────────────── */
let currentCanvas = null;
let lastPayload = '';

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('visible');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function generateQR() {
  clearError();
  saveConfig();

  const beneficiary = document.getElementById('beneficiary').value.trim();
  const ibanRaw     = document.getElementById('iban').value.trim();
  const bic         = document.getElementById('bic').value.trim().toUpperCase();
  const amountStr   = document.getElementById('amount').value.trim();
  const comm        = document.getElementById('communication').value.trim();

  if (!beneficiary) return showError('Renseignez le nom du bénéficiaire (section coordonnées).');
  if (!ibanRaw)     return showError('Renseignez l\'IBAN (section coordonnées).');
  const iban = formatIBAN(ibanRaw);
  if (!validateIBAN(iban)) return showError('Format IBAN invalide.');
  if (!amountStr || parseFloat(amountStr) <= 0) return showError('Montant invalide.');

  const amount = parseFloat(amountStr).toFixed(2);

  // EPC QR standard v002
  lastPayload = [
    'BCD','002','1','SCT',
    bic, beneficiary, iban,
    'EUR' + amount,
    '','', comm, ''
  ].join('\n');

  // Render QR
  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  currentCanvas = null;

  try {
    new QRCode(container, {
      text: lastPayload,
      width: 156, height: 156,
      colorDark: '#000', colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    return showError('Erreur QR : ' + e.message);
  }

  // Display info
  document.getElementById('displayAmount').innerHTML = amount + ' <span>EUR</span>';
  document.getElementById('displayComm').textContent = comm || '(sans communication)';
  document.getElementById('displayBenef').textContent = beneficiary;
  document.getElementById('displayIban').textContent = iban.replace(/(.{4})/g,'$1 ').trim();

  document.getElementById('qrResult').classList.add('visible');
  document.getElementById('qrResult').scrollIntoView({ behavior:'smooth', block:'nearest' });

  // Setup download
  setTimeout(() => {
    const canvas = container.querySelector('canvas');
    if (canvas) {
      currentCanvas = canvas;
      document.getElementById('btnDownload').onclick = downloadQR;
    }
  }, 300);
}

/* ─────────────────────────────────────────────
   DOWNLOAD
───────────────────────────────────────────── */
function downloadQR() {
  if (!currentCanvas) return;
  // Higher res version
  const big = document.createElement('canvas');
  big.width = 400; big.height = 400;
  const ctx = big.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,400,400);
  ctx.drawImage(currentCanvas, 22, 22, 356, 356);
  const link = document.createElement('a');
  const comm = document.getElementById('communication').value.trim();
  link.download = 'qr-virement-' + (comm||'patient').replace(/\s+/g,'-') + '.png';
  link.href = big.toDataURL('image/png');
  link.click();
}

/* ─────────────────────────────────────────────
   SHARE (Web Share API — natif iOS Safari)
───────────────────────────────────────────── */
async function shareQR() {
  if (!currentCanvas) return;
  const comm = document.getElementById('communication').value.trim();
  const amount = document.getElementById('amount').value;

  // Try native share with image
  if (navigator.share && navigator.canShare) {
    try {
      const big = document.createElement('canvas');
      big.width = 400; big.height = 400;
      const ctx = big.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,400,400);
      ctx.drawImage(currentCanvas, 22, 22, 356, 356);

      big.toBlob(async (blob) => {
        const file = new File([blob], 'virement-qr.png', { type: 'image/png' });
        try {
          await navigator.share({
            title: 'QR Virement — ' + (comm || 'Endodontie Louise'),
            text: 'QR code virement SEPA — ' + amount + ' EUR\nScannez avec votre app bancaire.',
            files: [file]
          });
        } catch(e) {
          if (e.name !== 'AbortError') downloadQR();
        }
      }, 'image/png');
      return;
    } catch(e) {}
  }

  // Fallback: simple share without file
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'QR Virement SEPA',
        text: 'Montant : ' + amount + ' EUR — ' + (comm || '') + '\nScannez avec votre application bancaire.'
      });
      return;
    } catch(e) {}
  }

  // Last resort: download
  downloadQR();
}

───────────────────────────────────────────── */
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isInStandaloneMode() {
  return ('standalone' in navigator && navigator.standalone);
}
function dismissBanner() {
  document.getElementById('install-banner').classList.remove('visible');
  try { sessionStorage.setItem('banner_dismissed','1'); } catch(e){}
}

function checkInstallBanner() {
  if (isIOS() && !isInStandaloneMode()) {
    const dismissed = sessionStorage.getItem('banner_dismissed');
    if (!dismissed) {
      setTimeout(() => {
        document.getElementById('install-banner').classList.add('visible');
      }, 2000);
    }
  }
}

/* ─────────────────────────────────────────────
   APP ICON (canvas-generated, no external file)
───────────────────────────────────────────── */
function generateAppIcon() {
  const c = document.createElement('canvas');
  c.width = 180; c.height = 180;
  const ctx = c.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0,0,180,180);
  grad.addColorStop(0,'#0a0f1e');
  grad.addColorStop(1,'#1a3a8f');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0,0,180,180,36);
  ctx.fill();

  // Gold hexagon
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 5;
  const cx = 90, cy = 82, r = 36;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI/180*(60*i - 30);
    i===0 ? ctx.moveTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle))
           : ctx.lineTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle));
  }
  ctx.closePath();
  ctx.stroke();

  // € symbol
  ctx.fillStyle = '#c9a84c';
  ctx.font = 'bold 36px Helvetica Neue, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('€', cx, cy);

  // Label
  ctx.fillStyle = 'rgba(240,244,255,0.7)';
  ctx.font = '600 13px Helvetica Neue, Arial';
  ctx.fillText('VIREMENT QR', cx, 145);

  const dataURL = c.toDataURL('image/png');
  document.getElementById('apple-icon').href = dataURL;
  document.getElementById('fav-icon').href = dataURL;

  // Manifest inline
  const manifest = {
    name: 'QR Virement — Endodontie Louise',
    short_name: 'QR Virement',
    description: 'Générateur de QR code de virement SEPA pour patients',
    start_url: './',
    display: 'standalone',
    background_color: '#0a0f1e',
    theme_color: '#0a0f1e',
    orientation: 'portrait',
    icons: [
      { src: dataURL, sizes: '180x180', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
}

/* ─────────────────────────────────────────────
   SERVICE WORKER (offline cache)
───────────────────────────────────────────── */
function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  const swCode = `
const CACHE = 'endo-qr-v1';
const CDNJS = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
const FONTS  = 'https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap';

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([CDNJS, FONTS]).catch(()=>{}))
  );
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(resp => {
        if (resp && resp.status === 200) {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => cached);
    })
  );
});
`;

  const swBlob = new Blob([swCode], {type:'text/javascript'});
  const swURL  = URL.createObjectURL(swBlob);

  navigator.serviceWorker.register(swURL, {scope: './'})
    .catch(() => {}); // silently fail if scope issue
}

/* ─────────────────────────────────────────────
   ONLINE / OFFLINE
───────────────────────────────────────────── */
function updateOnlineStatus() {
  document.getElementById('offline-badge').classList.toggle('visible', !navigator.onLine);
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  checkPinSession();
  loadConfig();
  generateAppIcon();
  registerServiceWorker();
  checkInstallBanner();
  updateOnlineStatus();

  // IBAN format on blur
  document.getElementById('iban').addEventListener('blur', function() {
    const clean = this.value.replace(/\s/g,'').toUpperCase();
    this.value = clean.replace(/(.{4})/g,'$1 ').trim();
  });

  // Enter → generate
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.target.closest('#bankBody')) generateQR();
  });

  // If config already saved, collapse bank section
  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if (cfg.iban) {
      // Already configured — keep collapsed
    } else {
      toggleBank(); // open on first use
    }
  } catch(e) { toggleBank(); }
});
