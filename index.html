<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code SEPA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Pro Display',-apple-system,sans-serif;background:#0d0514;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
.pin-wrap{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
.pin-card{background:rgba(0,0,0,0.55);backdrop-filter:blur(20px);border:1px solid rgba(168,85,247,0.20);border-radius:24px;padding:44px 52px;text-align:center;box-shadow:0 0 60px rgba(168,85,247,0.10),0 0 120px rgba(168,85,247,0.05)}
.logo-ring{width:56px;height:56px;border-radius:50%;border:1.5px solid #a855f7;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 20px rgba(168,85,247,0.30)}
.logo-ring svg{width:24px;height:24px}
.app-name{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#a855f7;margin-bottom:6px;font-weight:500}
.app-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-0.5px}
.app-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:36px;letter-spacing:1px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:36px}
.dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);background:transparent;transition:all .2s}
.dot.filled{background:#a855f7;border-color:#a855f7;box-shadow:0 0 10px rgba(168,85,247,0.50)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;justify-content:center}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:22px;font-weight:300;cursor:pointer;transition:all .15s;letter-spacing:0}
.pin-btn:hover{background:rgba(168,85,247,0.15);border-color:#a855f7;color:#a855f7}
.pin-btn:active{transform:scale(0.92);background:rgba(168,85,247,0.25)}
.pin-btn.del{font-size:18px;color:rgba(255,255,255,0.4)}
.pin-btn.del:hover{color:#a855f7}
.pin-btn.empty{visibility:hidden}
.pin-error{color:#ff6b6b;font-size:12px;letter-spacing:1px;margin-top:20px;min-height:18px}
.divider{width:40px;height:1px;background:rgba(255,255,255,0.1);margin:0 auto 24px}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="pin-wrap">
  <div class="pin-card">
    <div class="logo-ring"><svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h3v3h-3zM14 18h3v3h-3zM19 20h2v1h-2z"/></svg></div>
    <div class="app-name">Paiements</div>
    <div class="app-title">QR Code SEPA</div>
    <div class="app-sub">Cabinet Endodontie Louise</div>
    <div class="divider"></div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="p('1')">1</button>
      <button class="pin-btn" onclick="p('2')">2</button>
      <button class="pin-btn" onclick="p('3')">3</button>
      <button class="pin-btn" onclick="p('4')">4</button>
      <button class="pin-btn" onclick="p('5')">5</button>
      <button class="pin-btn" onclick="p('6')">6</button>
      <button class="pin-btn" onclick="p('7')">7</button>
      <button class="pin-btn" onclick="p('8')">8</button>
      <button class="pin-btn" onclick="p('9')">9</button>
      <button class="pin-btn empty"></button>
      <button class="pin-btn" onclick="p('0')">0</button>
      <button class="pin-btn del" onclick="del()">&#9003;</button>
    </div>
    <div class="pin-error" id="err"></div>
  </div>
</div>
<script>
const PIN='210687';
const COLOR='#a855f7';
const BG='#0d0514';
let entry='';

function p(d){
  if(entry.length>=6)return;
  entry+=d;
  document.getElementById('d'+(entry.length-1)).classList.add('filled');
  if(entry.length===6){
    setTimeout(()=>{
      if(entry===PIN){
        window.location.href='qr-virement-app.html';
      } else {
        document.getElementById('err').textContent='Code incorrect — réessayez';
        entry='';
        for(let i=0;i<6;i++)document.getElementById('d'+i).classList.remove('filled');
      }
    },200);
  }
}
function del(){
  if(!entry.length)return;
  entry=entry.slice(0,-1);
  document.getElementById('d'+entry.length).classList.remove('filled');
  document.getElementById('err').textContent='';
}
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')p(e.key);
  if(e.key==='Backspace')del();
});

// Particles
const cv=document.getElementById('bg');
const cx=cv.getContext('2d');
let W,H,pts;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;init();}
function init(){pts=Array.from({length:Math.floor(W*H/5000)},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+.5,ph:Math.random()*Math.PI*2}));}
function hex2rgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`;}
function draw(){
  cx.fillStyle=BG;cx.fillRect(0,0,W,H);
  const rgb=hex2rgb(COLOR);
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){cx.globalAlpha=(1-d/100)*.35;cx.strokeStyle=COLOR;cx.lineWidth=.5;cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.stroke();}
    }
  }
  pts.forEach(p=>{
    p.ph+=.02;const g=Math.sin(p.ph)*.4+.6;
    cx.globalAlpha=g;cx.fillStyle=COLOR;cx.beginPath();cx.arc(p.x,p.y,p.r*g,0,Math.PI*2);cx.fill();
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
  });
  cx.globalAlpha=1;requestAnimationFrame(draw);
}
resize();draw();window.addEventListener('resize',resize);
</script>
</body>
</html>
